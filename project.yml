name: PS5MacCompanion
options:
  bundleIdPrefix: com.ps5maccompanion
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.ps5maccompanion.app
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_LSUIElement: YES
    INFOPLIST_KEY_NSPrincipalClass: NSApplication
    INFOPLIST_KEY_GCSupportsControllerUserInteraction: YES
    INFOPLIST_KEY_GCSupportsGameMode: YES
    # Free-tier "Sign to Run Locally" — Xcode will fill in your team
    # automatically when you open the project and pick a signing identity
    # in the Signing & Capabilities tab.
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "-"
targets:
  PS5MacCompanion:
    type: application
    platform: macOS
    sources:
      - path: Sources/DualSenseMac
        excludes:
          - "Resources/Info.plist"
    info:
      path: Sources/DualSenseMac/Resources/Info.plist
      properties:
        LSMinimumSystemVersion: "13.0"
        LSUIElement: true
        NSPrincipalClass: NSApplication
        CFBundleName: PS5MacCompanion
        CFBundleDisplayName: PS5MacCompanion
        CFBundleIdentifier: com.ps5maccompanion.app
        GCSupportsControllerUserInteraction: true
        GCSupportsGameMode: true
        GCSupportedGameControllers:
          - ProfileName: ExtendedGamepad
    settings:
      base:
        # Use the Info.plist file rather than synthesizing one
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/DualSenseMac/Resources/Info.plist
    dependencies:
      - sdk: IOKit.framework
      - sdk: AppKit.framework
      - sdk: GameController.framework
      - sdk: CoreHaptics.framework
